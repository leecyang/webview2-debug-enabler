name: MSBuild

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build Solution
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # 我们不在文件里改，直接在这里把 C++20 和相关修复补丁“焊死”在编译指令里
      run: |
        msbuild ${{env.SOLUTION_FILE_PATH}} `
          -property:Configuration=${{env.BUILD_CONFIGURATION}} `
          -property:Platform=${{env.BUILD_PLATFORM}} `
          -property:PlatformToolset=v143 `
          -property:LanguageStandard=stdcpp20 `
          -property:ConformanceMode=true `
          -property:AdditionalOptions="/permissive- /utf-8" `
          -target:Rebuild `
          -maxCpuCount

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WebView2-Debug-Enabler-Package
        path: |
          **/x64/Release/*.exe
          **/x64/Release/*.dll
          **/x64/Release/*.pdb
